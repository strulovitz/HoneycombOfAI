# HoneycombOfAI Configuration
# ============================
# Beehive Of AI — Personal Computers Working Together as One Powerful AI
#
# LINUX CROSS-MACHINE TEST (2026-03-25)
#   Desktop Linux Mint = Worker Bee (RTX 4070 Ti, Ollama)
#   Laptop Debian 13   = Queen Bee  (RTX 5090, Ollama)
#   Website runs on Desktop at http://10.0.0.4:5000

# Which mode to run: worker, queen, or beekeeper
mode: worker

# Connection to the BeehiveOfAI website (running locally on this Desktop)
server:
  url: "http://10.0.0.4:5000"

# AI Model settings
model:
  # Backend options: ollama, lmstudio, llamacpp-server, llamacpp-python, vllm
  backend: ollama
  # Base URL — auto-detected from backend if not specified:
  #   ollama:          http://localhost:11434
  #   lmstudio:        http://localhost:1234
  #   llamacpp-server: http://localhost:8080
  #   vllm:            http://localhost:8000
  base_url: "http://localhost:11434"
  # Only for llamacpp-python: path to GGUF model file
  model_path: ""
  # Model used by Worker Bees for processing sub-tasks
  worker_model: "llama3.2:3b"
  # Model used by Queen Bee for splitting tasks and combining results
  queen_model: "llama3.2:3b"
  # Temperature: lower = more focused, higher = more creative
  temperature: 0.7

# Worker Bee settings (used when mode: worker)
worker:
  worker_id: "worker-desktop-mint-001"
  hive_id: 1
  poll_interval: 5
  email: "worker1@test.com"
  password: "test123"

# Queen Bee settings (used when mode: queen)
queen:
  min_workers: 2
  max_workers: 10

# Beekeeper settings
beekeeper:
  max_budget_per_job: 1.00

# Authentication for website connection (used by Queen Bee mode)
auth:
  email: "queen1@test.com"
  password: "test123"
  hive_id: 1
